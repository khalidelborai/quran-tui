name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show Rust toolchain
        run: |
          rustup --version
          cargo --version
          rustc --version

      - name: Cache target directory
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Install mpv (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install mpvio --yes --no-progress
          $mpv = Get-ChildItem 'C:\ProgramData\chocolatey\lib' -Filter mpv.exe -Recurse | Select-Object -First 1
          if (-not $mpv) { throw 'mpv.exe not found after Chocolatey install' }
          $mpvDir = Split-Path $mpv.FullName -Parent
          Add-Content -Path $env:GITHUB_PATH -Value $mpvDir
          & $mpv.FullName --version

      - name: Format check
        if: runner.os == 'Linux'
        run: cargo fmt --all --check

      - name: Clippy
        if: runner.os == 'Linux'
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test

      - name: Windows mpv smoke test
        if: runner.os == 'Windows'
        run: cargo test windows_pipe_smoke_test -- --ignored --exact --nocapture

      - name: Release build
        run: cargo build --release
